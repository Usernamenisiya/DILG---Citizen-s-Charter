directories:
  output: release
  buildResources: build
appId: ph.dilg.caraga.kiosk
productName: DILG Citizen Charter Kiosk
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - package.json
extraResources:
  - from: my-custom-backend
    to: my-custom-backend
win:
  target:
    - nsis
  icon: build/DILG-LOGO.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
electronVersion: 36.3.2
